services:
  # === Backend (FastAPI) ===
  - type: web
    name: classification-banana-backend
    env: python
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
    buildFilter:
      paths:
        included:
          - "backend/**"
        ignored: []

  # === Frontend (Vite static) ===
  - type: web
    name: classification-banana-frontend
    env: static
    rootDir: frontend
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: classification-banana-backend
          type: web
          property: url
    buildFilter:
      paths:
        included:
          - "frontend/**"
        ignored: []