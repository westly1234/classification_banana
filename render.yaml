services:
  # 1. 데이터베이스 서비스 (PostgreSQL)
  # SQLite 대신 사용할 영구 데이터베이스입니다.
  - type: psql
    name: banana-database
    plan: free # 무료 플랜으로 시작할 수 있습니다.
    region: singapore # 가까운 리전 선택 (예: oregon, singapore)

  # 2. 백엔드 서비스 (FastAPI)
  - type: web
    name: classification-banana-backend
    env: python
    region: singapore # 데이터베이스와 동일한 리전으로 설정하세요.
    rootDir: backend
    # PyTorch/YOLO는 메모리를 많이 사용하므로 Starter 이상의 플랜을 권장합니다.
    plan: starter
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: / # 루트 경로로 서버 상태를 확인합니다.
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL # 데이터베이스 주소를 환경변수로 주입
        fromDatabase:
          name: banana-database
          property: connectionString

  # 3. 프론트엔드 서비스 (Static Site)
  - type: web
    name: classification-banana-frontend
    env: static
    region: singapore # 다른 서비스와 동일한 리전으로 설정하세요.
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist # 빌드 결과물이 생성되는 폴더
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE # 프론트엔드에서 사용할 백엔드 API 주소
        fromService:
          type: web
          name: classification-banana-backend # 백엔드 서비스 이름과 일치해야 함
          property: url