databases:
  - name: banana-database
    plan: free
    region: singapore

services:
  # 1. 백엔드 서비스 (FastAPI)
  - type: web
    name: classification-banana-backend
    env: python
    region: singapore
    plan: starter # PyTorch/YOLO는 메모리를 많이 사용하므로 Starter 플랜을 권장합니다.
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL # 생성된 데이터베이스의 주소를 환경변수로 주입합니다.
        fromDatabase:
          name: banana-database
          property: connectionString

  # 2. 프론트엔드 서비스 (Static Site)
  - type: web
    name: classification-banana-frontend
    env: static
    region: singapore
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: classification-banana-backend
          property: url