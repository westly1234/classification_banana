databases:
  - name: banana-database
    region: singapore
    plan: free

services:
  # 1) Backend (Docker)
  - type: web
    name: classification-banana-backend
    env: docker
    region: singapore
    plan: free
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banana-database
          property: internalConnectionString
    buildFilter:
      paths: [ "backend/**" ]

  # 2) Frontend (Vite static)
  - type: web
    name: classification-banana-frontend
    env: static
    rootDir: frontend
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # 'url'은 지원 안 됨. host만 받을 수 있음.
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: classification-banana-backend
          property: host
    buildFilter:
      paths: [ "frontend/**" ]
