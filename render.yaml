services:
  # 1. 백엔드 서비스 (FastAPI)
  - type: web
    name: classification-banana-backend
    env: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /

  # 2. 프론트엔드 서비스 (Static Site)
  - type: web
    name: classification-banana-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html