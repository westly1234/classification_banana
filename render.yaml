databases:
  - name: banana-database
    plan: free
    region: singapore

services:
  # 1. 백엔드 서비스 (FastAPI)
  - type: web
    name: classification-banana-backend
    env: python
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        fromDatabase:
          name: banana-database
          property: connectionString

  # 2. 프론트엔드 서비스 (Static Site)
  - type: web # 프론트엔드도 web 서비스의 한 종류입니다.
    name: classification-banana-frontend
    env: static
    # region은 static site에 사용할 수 없으므로 삭제된 상태를 유지합니다.
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        # 'fromService' 블록의 올바른 구조입니다.
        fromService:
          type: web # ❗참조할 서비스의 타입을 'web'으로 명시해야 합니다.
          name: classification-banana-backend # ❗참조할 서비스의 이름
          property: url # ❗'web' 타입의 서비스에서 'url' 속성을 가져옵니다.