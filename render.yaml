databases:
  - name: banana-database
    region: singapore
    plan: free

services:
  # 1. 백엔드 서비스
  - type: web
    name: classification-banana-backend
    env: python
    region: singapore
    plan: free # 무료 플랜
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
            property: connectionString

  # 2. 프론트엔드 서비스
  - type: web
    name: classification-banana-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
            type: web
            name: classification-banana-backend
            property: url