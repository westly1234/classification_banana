databases:
  - name: banana-database
    region: singapore
    plan: free

services:
  # 1) Backend
  - type: web
    name: classification-banana-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banana-database 
          property: connectionString

  # 2) Frontend (Vite)
  - type: web
    name: classification-banana-frontend
    env: static
    rootDir: frontend
    buildCommand: |
      npm ci
      npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        fromService:
          type: web
          name: classification-banana-backend
          property: host              
